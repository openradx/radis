{% extends "labels/labels_layout.html" %}
{% block title %}
    Delete Question Set
{% endblock title %}
{% block heading %}
    <c-page-heading title="Auto Labels" />
{% endblock heading %}
{% block content %}
    <div class="alert alert-warning">You are about to delete the question set "{{ object.name }}".</div>
    <form method="post">
        {% csrf_token %}
        <div class="d-flex gap-2">
            <a href="{% url 'question_set_detail' object.pk %}"
               class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-danger">Delete Set</button>
        </div>
    </form>
{% endblock content %}
